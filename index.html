<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omad Tour servis</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#05070c;
  color:white;
}

/* 🔥 SPLASH (NACHAT SCREEN) */
#splash{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#05070c;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#splash .logo{
  font-size:32px;
  font-weight:bold;
  margin-bottom:20px;
}

#startBtn{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* 🔻 MAIN */
.container{
  max-width:480px;
  margin:auto;
  padding:15px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logoBox{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.title{
  font-size:18px;
  font-weight:600;
}

.back-btn{
  display:inline-block;
  padding:8px 12px;
  background:#1f2937;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:10px;
}

.card{
  background:#111827;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  border:1px solid #1f2937;
}

.btn{
  background:linear-gradient(135deg,#6366f1,#9333ea);
  padding:14px;
  border-radius:14px;
  text-align:center;
  margin-top:10px;
  cursor:pointer;
}

.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1f2937;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.address{
  margin-top:20px;
  font-size:13px;
  opacity:0.8;
}

.page{display:none;}
.active{display:block;}

.call-row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.call-btn{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- 🔥 START (NACHAT) SCREEN -->
<div id="splash">
  <img src="sss png.png" class="logo">
  <button id="startBtn" onclick="startApp()">🚀 NACHAT</button>
</div>

<!-- MAIN -->
<div id="mainApp" class="hidden">

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="header">
  <div class="logoBox">
    <img src="sss png.png" class="logo">
    <div class="title">Омад Тур сервис</div>
  </div>

  <div>
    <button onclick="setLang('uz')">UZ🇺🇿</button>
    <button onclick="setLang('ru')">RU🇷🇺</button>
  </div>
</div>

<div class="card">
  <div class="btn" onclick="openPage('avia')" id="aviaBtn">
    ✈️ Avia bilet bron qilish
  </div>
</div>

<div class="card">

  <div class="task" onclick="openPage('visa')" id="visaBtn">
    <span>🛂 Viza javoblari</span><span>→</span>
  </div>

  <div class="task" onclick="window.open('https://t.me/+uJn1nFmpzjoxMGEy')" id="groupBtn">
    <span>👥 Telegram guruh</span><span>→</span>
  </div>

  <div class="task" onclick="openPage('anketa')" id="anketaBtn">
    <span>📝 Anketa xizmatlari</span><span>→</span>
  </div>

</div>

<div class="address">
ООО «ОмадТур»<br>
Санкт-Петербург
</div>

</div>

</div>
</div>

<script>

/* 🔥 NACHAT BUTTON */
function startApp(){
  document.getElementById("splash").style.display="none";
  document.getElementById("mainApp").classList.remove("hidden");
}

/* PAGE */
function openPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LANG */
function setLang(lang){

if(lang==="ru"){
document.getElementById("aviaBtn").innerText="✈️ Бронирование";
document.getElementById("visaBtn").innerHTML="🛂 Виза →";
document.getElementById("groupBtn").innerHTML="👥 Группа →";
document.getElementById("anketaBtn").innerHTML="📝 Анкета →";
}else{
document.getElementById("aviaBtn").innerText="✈️ Avia bilet";
document.getElementById("visaBtn").innerHTML="🛂 Viza →";
document.getElementById("groupBtn").innerHTML="👥 Guruh →";
document.getElementById("anketaBtn").innerHTML="📝 Anketa →";
}

}

</script>

</body>
</html>
